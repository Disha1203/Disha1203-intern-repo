version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: demodb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  cache:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    image: nginx
    ports:
      - "8080:80"
    depends_on:
      - db
      - cache

volumes:
  pg_data: